<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NexChat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
:root{--bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#242428;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--accent:#7c6aff;--accent2:#a594ff;--glow:rgba(124,106,255,0.15);--text:#f0eff5;--text2:#9b9aa5;--text3:#5e5d68;--green:#2ec27e;--red:#f05a5a;--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px;--r-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#app{display:flex;height:100vh}
#sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s;z-index:50}
.sb-head{padding:18px 14px 12px;border-bottom:1px solid var(--border)}.logo{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}.sb-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.sb-rooms{flex:1;overflow-y:auto;padding:10px 6px}.sb-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 8px 6px;font-weight:500}
.room-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--text2);font-size:13px;transition:background .15s}.room-item:hover{background:var(--bg3);color:var(--text)}.room-item.active{background:var(--glow);color:var(--accent2)}
.add-room{margin:4px 6px;height:34px;border-radius:var(--r-sm);border:1px dashed var(--border2);background:0 0;color:var(--text3);font-family:var(--font);font-size:12px;cursor:pointer;width:calc(100% - 12px);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}.add-room:hover{border-color:var(--accent);color:var(--accent);background:var(--glow)}
.sb-apps{padding:10px 6px;border-top:1px solid var(--border)}.app-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:background .15s;border:none;background:0 0;width:100%;text-align:left}.app-btn:hover{background:var(--bg3);color:var(--text)}.app-btn .app-ico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}.wa-ico{background:#25d366}.tg-ico{background:#2aabee}.app-badge{margin-left:auto;font-size:10px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;color:var(--text3)}
.sb-foot{padding:10px 14px 16px;border-top:1px solid var(--border)}.share-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px}.share-lbl{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500}.share-url{font-family:var(--mono);font-size:9px;color:var(--accent2);word-break:break-all;margin-bottom:6px}.copy-btn{width:100%;height:28px;border-radius:6px;border:1px solid var(--accent);background:0 0;color:var(--accent);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .15s}.copy-btn:hover{background:var(--accent);color:#fff}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#chat-header{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:10}
.chat-title{display:flex;align-items:center;gap:8px}.chat-title h2{font-size:15px;font-weight:500}.odot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0}
.room-actions{display:flex;align-items:center;gap:4px;margin-left:10px}
.room-action-btn{background:0 0;border:none;color:var(--text3);font-size:14px;cursor:pointer;opacity:.5;transition:all .15s;padding:4px}
.room-action-btn:hover{opacity:1;transform:scale(1.1)}
.hactions{display:flex;gap:6px}.ico-btn{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border2);background:0 0;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}.ico-btn:hover{background:var(--bg3);color:var(--text)}.ico-btn.active{color:var(--accent)}#hamburger{display:none}
#search-bar{display:none;padding:7px 14px;border-bottom:1px solid var(--border);background:var(--bg2);z-index:9}#search-input{width:100%;height:32px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:13px;padding:0 10px;outline:0}#search-input:focus{border-color:var(--accent)}
#msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth}#msgs::-webkit-scrollbar{width:3px}#msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.msg-group{display:flex;flex-direction:column;gap:2px;margin-bottom:8px;animation:fadeIn .3s ease}.msg-group.mine{align-items:flex-end}.msg-group.theirs{align-items:flex-start}.msg-meta{font-size:11px;color:var(--text3);padding:0 2px;margin-bottom:2px;display:flex;align-items:center;gap:5px}.msg-group.mine .msg-meta{flex-direction:row-reverse}.msg-sender{font-weight:500;color:var(--text2)}.bubble{max-width:460px;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.55;word-break:break-word;position:relative}.mine .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}.theirs .bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}.bubble a{color:inherit;opacity:.85}.link-prev{background:rgba(0,0,0,.2);border-left:3px solid var(--accent2);border-radius:5px;padding:6px 8px;margin-top:5px;font-size:11px}.link-url{color:var(--accent2);font-family:var(--mono);font-size:10px}.msg-img{max-width:300px;border-radius:9px;cursor:pointer;display:block}.msg-vid{max-width:340px;border-radius:9px;background:#000}.msg-aud audio{width:240px;height:36px;outline:none}.msg-file{display:flex;align-items:center;gap:9px}.file-ico{font-size:20px}.file-info{flex:1;min-width:0}.file-nm{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.file-sz{font-size:10px;opacity:.6}.dl-btn{font-size:17px;text-decoration:none;opacity:.7;transition:opacity .15s}.dl-btn:hover{opacity:1}.sys-msg{text-align:center;font-size:11px;color:var(--text3);padding:5px 0;font-family:var(--mono)}.date-div{display:flex;align-items:center;gap:8px;padding:6px 0}.date-div span{font-size:10px;color:var(--text3);white-space:nowrap}.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border)}.highlight{background:rgba(124,106,255,.3);border-radius:2px}.mention{color:var(--accent2);font-weight:500}
.del-btn, .rep-btn {background:0 0;border:none;cursor:pointer;opacity:0.4;font-size:13px;margin-left:8px;transition:all .2s;display:inline-flex;align-items:center;height:100%;padding:0 4px}
.del-btn:hover{opacity:1;color:var(--red);transform:scale(1.1)} .rep-btn:hover{opacity:1;color:var(--accent2);transform:scale(1.1)}
.msg-status{font-size:11px; margin-left:6px; opacity:0.8; display:inline-flex; align-items:center;}
.quote-box{border-left:3px solid var(--accent);padding:4px 8px;margin-bottom:6px;background:rgba(0,0,0,0.2);border-radius:4px;font-size:11px;cursor:pointer}
#reply-bar{display:none;padding:8px 14px;background:var(--bg3);border-top:1px solid var(--border);font-size:11px;color:var(--text2);align-items:center;justify-content:space-between}#reply-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90%}
#input-bar{padding:10px 14px 14px;border-top:1px solid var(--border);background:var(--bg2);z-index:10}.input-wrap{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:7px;display:flex;flex-direction:column;transition:border-color .2s}.input-wrap:focus-within{border-color:var(--accent)}#att-preview{display:none;flex-wrap:wrap;gap:5px;padding:3px 3px 7px}.att-chip{background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;max-width:150px}.att-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.att-rm{cursor:pointer;color:var(--text3);font-size:13px;line-height:1}.att-rm:hover{color:var(--red)}#upload-prog{display:none;margin-bottom:5px}.up-lbl{font-size:11px;color:var(--text3);margin-bottom:3px}.up-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}.up-bar{height:100%;background:var(--accent);border-radius:2px;width:0;transition:width .2s}.input-row{display:flex;align-items:flex-end;gap:5px}.attach-btn{width:36px;height:36px;flex-shrink:0;border-radius:9px;border:1px solid var(--border2);background:var(--bg4);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s;user-select:none}.attach-btn:hover{background:var(--glow);border-color:var(--accent)}#msg-input{flex:1;background:0 0;border:none;outline:0;color:var(--text);font-family:var(--font);font-size:13px;resize:none;max-height:110px;min-height:34px;line-height:1.5;padding:5px 3px}#msg-input::placeholder{color:var(--text3)}.send-btn{width:36px;height:36px;border-radius:9px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s;flex-shrink:0}.send-btn:hover{background:var(--accent2);transform:scale(1.05)}.send-btn:disabled{opacity:.4;cursor:default;transform:none}.toolbar{display:flex;align-items:center;gap:3px;padding:3px 2px 0;border-top:1px solid var(--border);margin-top:3px}.tool-btn{width:28px;height:28px;border-radius:6px;border:none;background:0 0;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}.tool-btn:hover{background:var(--bg4);color:var(--text)}.emoji-row{display:flex;gap:3px;flex-wrap:wrap;padding:4px 2px}.emj{font-size:17px;cursor:pointer;padding:2px;border-radius:4px;line-height:1}.emj:hover{background:var(--bg4)}
#gen-panel{display:none;padding:8px 14px 0}#gen-panel.open{display:block}.gen-row{display:flex;gap:6px}#gen-input{flex:1;height:34px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:12px;padding:0 9px;outline:0}#gen-input:focus{border-color:var(--accent)}.gen-btn{height:34px;padding:0 12px;border-radius:var(--r-sm);border:1px solid var(--accent);background:0 0;color:var(--accent);font-family:var(--font);font-size:12px;cursor:pointer;white-space:nowrap}.gen-btn:hover{background:var(--accent);color:#fff}.gen-btn.close{border-color:var(--text3);color:var(--text3)}.gen-btn.close:hover{background:var(--bg4);color:var(--text)}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center;cursor:zoom-out}#lb.open{display:flex}#lb img{max-width:90vw;max-height:90vh;border-radius:8px}
#apps-panel{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}#apps-panel.open{display:flex}.apps-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:480px;max-width:95vw;overflow:hidden}.apps-box-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.apps-box-head h3{font-size:15px;font-weight:500}.apps-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:0 0;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}.apps-close:hover{background:var(--bg3)}.apps-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}.app-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .15s;text-align:center}.app-card:hover{border-color:var(--accent);background:var(--glow)}.app-card-ico{width:48px;height:48px;border-radius:12px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:26px}.app-card h4{font-size:13px;font-weight:500;margin-bottom:3px}.app-card p{font-size:11px;color:var(--text3);line-height:1.4}.app-card .open-tag{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:var(--accent2);border:1px solid var(--accent);border-radius:5px;padding:3px 8px}.apps-note{padding:0 16px 16px;font-size:11px;color:var(--text3);line-height:1.6;text-align:center}.apps-note a{color:var(--accent2)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:9px 16px;font-size:12px;color:var(--text);opacity:0;transition:all .3s;pointer-events:none;z-index:300;max-width:90vw;text-align:center}#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#nick-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}.nick-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:28px;width:320px;text-align:center}.nick-box h2{font-size:20px;font-weight:600;margin-bottom:5px}.nick-box p{color:var(--text2);font-size:13px;margin-bottom:20px}.nick-input{width:100%;height:42px;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:var(--font);font-size:14px;text-align:center;outline:0;transition:border-color .2s;padding:0 10px}.nick-input:focus{border-color:var(--accent)}.nick-btn{width:100%;height:42px;margin-top:10px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}.nick-btn:hover{background:var(--accent2)}
@media(max-width:680px){#sidebar{position:fixed;left:0;top:0;height:100%;z-index:50;transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}#hamburger{display:flex}.bubble{max-width:82vw}.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}.sidebar-overlay.show{display:block}}
*{scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}@keyframes spin{to{transform:rotate(360deg)}}.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="nick-modal">
  <div class="nick-box">
    <div style="font-size:34px;margin-bottom:10px">💬</div>
    <h2>NexChat</h2>
    <p>Escolha um apelido</p>
    <input class="nick-input" id="nick-input" placeholder="Seu nome..." maxlength="24" autocomplete="off">
    <button class="nick-btn" id="nick-btn">Entrar →</button>
  </div>
</div>

<div id="lb" onclick="closeLb()"><img id="lb-img" src="" alt=""></div>

<div id="apps-panel">
  <div class="apps-box">
    <div class="apps-box-head">
      <h3>📱 Apps</h3>
      <button class="apps-close" onclick="closeApps()">✕</button>
    </div>
    <div class="apps-grid">
      <div class="app-card" onclick="openApp('https://web.whatsapp.com')"><div class="app-card-ico wa-ico">💬</div><h4>WhatsApp</h4><span class="open-tag">↗ Abrir</span></div>
      <div class="app-card" onclick="openApp('https://web.telegram.org')"><div class="app-card-ico tg-ico">✈️</div><h4>Telegram</h4><span class="open-tag">↗ Abrir</span></div>
      <div class="app-card" onclick="openApp('https://discord.com/app')"><div class="app-card-ico" style="background:#5865f2">🎮</div><h4>Discord</h4><span class="open-tag">↗ Abrir</span></div>
      <div class="app-card" onclick="openApp('https://slack.com')"><div class="app-card-ico" style="background:#4a154b">⚡</div><h4>Slack</h4><span class="open-tag">↗ Abrir</span></div>
    </div>
    <div class="apps-note">Abre em nova aba já autenticado.</div>
  </div>
</div>

<div id="toast"></div>
<div class="sidebar-overlay" id="overlay" onclick="closeSb()"></div>

<div id="app">
  <div id="sidebar">
    <div class="sb-head"><div class="logo"><div class="logo-dot"></div>NexChat</div><div class="sb-sub">nuvem google</div></div>
    <div class="sb-rooms"><div class="sb-label">Salas</div><div id="room-list"></div><button class="add-room" id="add-room-btn">＋ Nova sala</button></div>
    
    <div class="sb-apps">
      <div class="sb-label">Ações do Sistema</div>
      <button class="app-btn" onclick="clearRoom()" style="color:var(--red);">
        <span class="app-ico" style="background:rgba(240,90,90,0.15)">🧹</span>Limpar Armazenamento
      </button>
    </div>

    <div class="sb-apps" style="border-top:none;">
      <div class="sb-label">Apps externos</div>
      <button class="app-btn" onclick="openApps()"><span class="app-ico wa-ico">💬</span>WhatsApp Web<span class="app-badge">↗</span></button>
      <button class="app-btn" onclick="openApps()"><span class="app-ico tg-ico">✈️</span>Telegram Web<span class="app-badge">↗</span></button>
      <button class="app-btn" onclick="openApps()"><span class="app-ico" style="background:#5865f2">🎮</span>Discord<span class="app-badge">↗</span></button>
    </div>
    <div class="sb-foot"><div class="share-box"><div class="share-lbl">🔗 Compartilhar</div><div class="share-url" id="share-url"></div><button class="copy-btn" id="copy-btn">Copiar link</button></div></div>
  </div>

  <div id="main">
    <div id="chat-header">
      <div class="chat-title">
        <button class="ico-btn" id="hamburger">☰</button>
        <div class="odot"></div>
        <h2 id="room-name"># geral</h2>
        <div class="room-actions">
          <button class="room-action-btn" onclick="editRoom()" title="Renomear Sala">✏️</button>
          <button class="room-action-btn" onclick="clearRoom()" title="Limpar Conversa">🧹</button>
          <button class="room-action-btn" onclick="deleteRoom()" title="Excluir Sala" style="color:var(--red)">🗑️</button>
        </div>
      </div>
      <div class="hactions">
        <button class="ico-btn" id="search-btn">🔍</button>
        <button class="ico-btn" id="key-btn" title="Criptografia E2EE">🔑</button>
        <button class="ico-btn" onclick="openApps()">📱</button>
        <button class="ico-btn" id="theme-btn">🌙</button>
      </div>
    </div>
    <div id="search-bar"><input id="search-input" placeholder="Buscar..."></div>
    <div id="msgs" role="log" aria-live="polite"></div>
    <div id="gen-panel"><div class="gen-row"><input id="gen-input" placeholder="Descreva a imagem (IA)..."><button class="gen-btn" id="gen-run">✨ Gerar</button><button class="gen-btn close" id="gen-close">✕</button></div><div style="height:6px"></div></div>
    
    <div id="reply-bar">
      <div id="reply-text">Respondendo a...</div>
      <button onclick="cancelReply()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px">✕</button>
    </div>

    <div id="input-bar">
      <div class="input-wrap" id="input-wrap">
        <div id="att-preview"></div>
        <div id="upload-prog"><div class="up-lbl" id="up-lbl">Enviando...</div><div class="up-track"><div class="up-bar" id="up-bar"></div></div></div>
        <div class="input-row">
          <label class="attach-btn" title="Anexar">📎<input type="file" id="file-input" multiple accept="*/*" onchange="handleFiles(this.files)" style="display:none"></label>
          <textarea id="msg-input" placeholder="Mensagem..." rows="1"></textarea>
          <button class="send-btn" id="send-btn">➤</button>
        </div>
        <div class="toolbar">
          <button class="tool-btn" id="rec-btn">🎙️</button><button class="tool-btn" id="emoji-btn">😊</button><button class="tool-btn" id="gen-toggle">✨</button>
          <label class="tool-btn">📷<input type="file" id="photo-input" multiple accept="image/*,video/*" capture="environment" onchange="handleFiles(this.files)" style="display:none"></label>
          <div style="flex:1"></div><span id="char-ct" style="font-size:10px;color:var(--text3);display:none"></span>
        </div>
        <div id="emoji-panel" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CHAVES E ESTADOS GLOBAIS
// ═══════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0j-DsFoGkCzkAcxei4KW9u4-Pxwy8XH9J4UOiZ75QBvNat6lvwqAHCBrxg9oqpb2B/exec";
const CLOUDINARY_CLOUD_NAME = "dgxvrajrm"; 
const CLOUDINARY_UPLOAD_PRESET = "wctmrwlj";

const $ = id => document.getElementById(id); 
let nick='', room='geral', pending=[], recording=false, mediaRec=null, audioChunks=[], lightMode=false;
let rooms=[], pollInterval=null, currentMsgs=[];
let lastSyncTime = 0; let lastRenderedDate = ''; let lastRenderedSender = '';

let roomKey = ''; 
let replyData = null; 
let loadingOlder = false; 
let localCache = JSON.parse(localStorage.getItem('nexchat:cache')) || {};

// ═══════════════════════════════════════════════
// CRIPTOGRAFIA E2EE
// ═══════════════════════════════════════════════
$('key-btn').addEventListener('click', () => {
  const k = prompt('Criptografia AES de ponta a ponta.\nDefina uma senha para a sala (ou deixe em branco para chat normal):', roomKey);
  if(k !== null) {
    roomKey = k;
    $('key-btn').classList.toggle('active', !!roomKey);
    showToast(roomKey ? '🔒 E2EE Ativado. Suas mensagens estão seguras.' : '🔓 E2EE Desativado');
    renderFullDOM(currentMsgs); 
  }
});

function enc(txt) {
  if(!roomKey || !txt) return txt;
  return "E2E::" + CryptoJS.AES.encrypt(txt, roomKey).toString();
}

function dec(txt) {
  if(!txt || typeof txt !== 'string' || !txt.startsWith("E2E::")) return txt;
  if(!roomKey) return "🔒 Mensagem Criptografada (Insira a Chave)";
  try {
    const bytes = CryptoJS.AES.decrypt(txt.replace("E2E::", ""), roomKey);
    const decTxt = bytes.toString(CryptoJS.enc.Utf8);
    return decTxt || "🔒 Erro: Chave Incorreta";
  } catch(e) { return "🔒 Erro na Descriptografia"; }
}

// ═══════════════════════════════════════════════
// INICIALIZAÇÃO E NOTIFICAÇÕES
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const s = localStorage.getItem('nexchat:nick');
  if(s) { nick=s; $('nick-modal').style.display='none'; init(); }
  else setTimeout(() => $('nick-input').focus(), 100);
});

$('nick-input').addEventListener('keydown', e => { if(e.key==='Enter') doNick(); });
$('nick-btn').addEventListener('click', doNick);

function doNick() {
  const v = $('nick-input').value.trim();
  if(!v) return;
  nick = v; localStorage.setItem('nexchat:nick', nick);
  $('nick-modal').style.display = 'none'; init();
}

function playBeep() {
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = actx.createOscillator(); const gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination);
    osc.type = 'sine'; osc.frequency.setValueAtTime(880, actx.currentTime);
    gain.gain.setValueAtTime(0.1, actx.currentTime);
    osc.start(); osc.stop(actx.currentTime + 0.1);
  } catch(e){}
}

function notify(newMsgs) {
  if(Notification.permission !== 'granted') return;
  const others = newMsgs.filter(m => m.nick !== nick && m.type !== 'system');
  if(others.length > 0 && document.hidden) {
    playBeep();
    const m = others[others.length - 1];
    let body = m.type === 'text' ? dec(m.text) : `📁 Enviou mídia/arquivo`;
    new Notification(`NexChat: ${m.nick}`, { body: body });
  }
}

// ATUALIZAÇÃO DOS TICKS DE LEITURA (🕒 -> ✓ -> ✓✓)
function updateTicks() {
  currentMsgs.forEach(m => {
    if (m.nick === nick) {
      const el = $('status-' + m.t);
      if (el) {
        if (m.status === 'sending') el.innerHTML = '🕒';
        else if (m.status === 'error') el.innerHTML = '❌';
        else {
          // Heurística Lógica: Se alguém mandou msg DEPOIS da minha, ele leu a minha.
          const isRead = currentMsgs.some(c => c.nick !== nick && c.t > m.t);
          el.innerHTML = isRead ? '<span style="color:var(--green)">✓✓</span>' : '✓';
        }
      }
    }
  });
}

async function init() {
  if(Notification.permission !== 'granted' && Notification.permission !== 'denied') Notification.requestPermission();
  $('share-url').textContent = location.href.split('?')[0];
  
  await loadRooms(); renderRooms(); await switchRoom(room);
  
  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    const newMsgs = await fetchMsgs(room, lastSyncTime);
    const filtered = newMsgs.filter(m => !currentMsgs.some(c => c.t === m.t && c.nick === m.nick));
    
    if(filtered.length > 0){
      lastSyncTime = Math.max(...filtered.map(m => m.t));
      currentMsgs = currentMsgs.concat(filtered);
      saveCache();
      renderDeltaDOM(filtered);
      updateTicks();
      scrollBot();
      notify(filtered);
    }
  }, 3000);
}

// ═══════════════════════════════════════════════
// CACHE (INDEXED-DB LITE via Storage) E SALAS
// ═══════════════════════════════════════════════
function saveCache() {
  localCache[room] = currentMsgs.slice(-50); 
  localStorage.setItem('nexchat:cache', JSON.stringify(localCache));
}

async function loadRooms() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=get_rooms`);
    const data = await res.json();
    if(Array.isArray(data) && data.length > 0) rooms = data;
    else rooms = ['geral', 'links', 'mídia'];
  } catch(e) { rooms = ['geral', 'links', 'mídia']; }
}

async function saveRooms() {
  try { fetch(SCRIPT_URL, { method: "POST", mode: 'no-cors', headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "update_rooms", rooms: rooms }) }); } catch(e) {}
}

function renderRooms() {
  const I = {geral:'💬',links:'🔗',mídia:'🎬'};
  $('room-list').innerHTML = rooms.map(r => 
    `<div class="room-item ${r===room?'active':''}" onclick="closeSb(); switchRoom('${r}')"><span style="font-size:15px">${I[r]||'💬'}</span>${r}</div>`
  ).join('');
}

$('add-room-btn').addEventListener('click', () => {
  const n = prompt('Nome da nova sala:');
  if(!n?.trim()) return;
  const c = n.trim().toLowerCase().replace(/\s+/g,'-');
  if(rooms.includes(c)) return showToast('Sala já existe!');
  rooms.push(c); saveRooms(); renderRooms(); switchRoom(c);
});

async function editRoom() {
  if (room === 'geral') return showToast('A sala geral não pode ser editada.');
  const newName = prompt('Novo nome para a sala:', room);
  if (!newName || newName.trim() === '' || newName === room) return;
  const clean = newName.trim().toLowerCase().replace(/\s+/g,'-');
  if (rooms.includes(clean)) return showToast('Nome já existe!');

  const oldName = room; rooms[rooms.indexOf(oldName)] = clean; room = clean;
  $('room-name').textContent = '# ' + clean; renderRooms(); saveRooms();
  try { fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'rename_room', oldName: oldName, newName: clean }) }); } catch(e){}
  showToast('Sala renomeada!');
}

async function deleteRoom() {
  if (room === 'geral') return showToast('A sala geral não pode ser excluída.');
  if (!confirm(`Tem certeza que deseja EXCLUIR a sala "${room}" e TODAS as suas mensagens?`)) return;
  try { fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'purge', room: room }) }); } catch(e){}
  rooms = rooms.filter(r => r !== room); saveRooms(); showToast('Sala excluída!'); switchRoom('geral');
}

async function clearRoom() {
  if (!confirm(`Tem certeza que deseja LIMPAR TODA A CONVERSA da sala "${room}"? Arquivos de mídia desta sala também serão apagados da nuvem.`)) return;
  $('msgs').innerHTML='<div style="text-align:center;padding:50px"><div class="spinner" style="border-top-color:var(--red);"></div><div style="font-size:12px;margin-top:10px;color:var(--red)">Limpando sala...</div></div>';
  try { fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'purge', room: room }) }); } catch(e){}
  currentMsgs = []; lastSyncTime = 0; saveCache();
  setTimeout(() => { renderFullDOM([]); showToast('Conversa e Armazenamento limpos!'); }, 1500);
}

async function fetchMsgs(r, last = 0) {
  try { return await (await fetch(`${SCRIPT_URL}?room=${r}&last=${last}`)).json(); } catch(e) { return []; }
}

async function switchRoom(r) {
  room=r; $('room-name').textContent='# '+r; renderRooms();
  currentMsgs=[]; lastSyncTime = 0; 
  
  if(localCache[room] && localCache[room].length > 0) {
    currentMsgs = localCache[room];
    lastSyncTime = Math.max(...currentMsgs.map(x => x.t));
    renderFullDOM(currentMsgs);
    scrollBot(true);
  } else {
    $('msgs').innerHTML='<div style="text-align:center;padding:50px"><div class="spinner"></div><div style="font-size:12px;margin-top:10px;color:var(--text3)">Sincronizando nuvem...</div></div>';
  }

  const m = await fetchMsgs(r, lastSyncTime); 
  if(m.length > 0) {
    lastSyncTime = Math.max(...m.map(x => x.t));
    currentMsgs = currentMsgs.concat(m);
    renderFullDOM(currentMsgs); 
    scrollBot(true);
    saveCache();
  }
  sysMsg(r, `${nick} entrou na sala`);
}

// ═══════════════════════════════════════════════
// PAGINAÇÃO INFINITA (SCROLL)
// ═══════════════════════════════════════════════
$('msgs').addEventListener('scroll', async () => {
  if($('msgs').scrollTop === 0 && !loadingOlder && currentMsgs.length >= 50) {
    loadingOlder = true;
    $('msgs').insertAdjacentHTML('afterbegin', '<div id="pag-spin" style="text-align:center;padding:10px;"><div class="spinner"></div></div>');
    const oldH = $('msgs').scrollHeight;
    
    try {
      const res = await fetch(`${SCRIPT_URL}?action=get_older&room=${room}&before=${currentMsgs[0].t}&limit=50`);
      const older = await res.json();
      $('pag-spin')?.remove();
      
      if(older.length > 0) {
        currentMsgs = older.concat(currentMsgs);
        const sv = ($('search-input').value||'').toLowerCase();
        const h = older.map(m => buildMsgHTML(m, sv)).join('');
        $('msgs').insertAdjacentHTML('afterbegin', h);
        $('msgs').scrollTop = $('msgs').scrollHeight - oldH; 
        updateTicks();
      }
    } catch(e) { $('pag-spin')?.remove(); }
    loadingOlder = false;
  }
});

// RESPOSTAS E DELEÇÕES
// ═══════════════════════════════════════════════
function setReply(t, n) {
  const msg = currentMsgs.find(x => x.t === t);
  if(!msg) return;
  replyData = { nick: n, text: msg.text };
  $('reply-text').innerHTML = `Respondendo a <strong>${esc(n)}</strong>`;
  $('reply-bar').style.display = 'flex';
  $('msg-input').focus();
}

function cancelReply() { replyData = null; $('reply-bar').style.display = 'none'; }

async function delMsg(t, nk, btn) {
  if(!confirm('Deseja excluir esta mensagem permanentemente?')) return;
  const msgElement = btn.closest('.msg-group');
  if (msgElement) msgElement.style.display = 'none';
  currentMsgs = currentMsgs.filter(x => !(x.t === t && x.nick === nk));
  saveCache();
  try { fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'delete', t: t, nick: nk }) }); } catch(e){}
}

// ═══════════════════════════════════════════════
// RENDERIZAÇÃO DOM
// ═══════════════════════════════════════════════
function buildMsgHTML(m, sv) {
  let h='';
  const d = new Date(m.t).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  if(d!==lastRenderedDate){ h+=`<div class="date-div"><span>${d}</span></div>`; lastRenderedDate=d; lastRenderedSender=''; }
  if(m.type==='system'){ return h+`<div class="sys-msg">${esc(m.text)}</div>`; }
  
  h+=`<div class="msg-group ${m.nick===nick?'mine':'theirs'}">`;
  if(m.nick!==lastRenderedSender) h+=`<div class="msg-meta"><span class="msg-sender">${esc(m.nick)}</span><span>${new Date(m.t).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span></div>`;
  lastRenderedSender=m.nick;
  
  const delBtn = `<button class="del-btn" title="Excluir" onclick="delMsg(${m.t}, '${esc(m.nick)}', this)">🗑️</button>`;
  const repBtn = `<button class="rep-btn" title="Responder" onclick="setReply(${m.t}, '${esc(m.nick)}')">↩️</button>`;
  
  // Status Tick (Apenas para as minhas mensagens)
  const statusHtml = m.nick === nick ? `<span id="status-${m.t}" class="msg-status"></span>` : '';
  const actions = delBtn + repBtn + statusHtml;
  
  const dlBtn = `<a class="dl-btn" href="${esc(m.dataUrl).replace('/upload/', '/upload/fl_attachment/')}" target="_blank" title="Baixar" style="font-size:15px; margin-left:auto;">⬇️</a>`;
  const mediaFooter = `<div style="display:flex; align-items:center; padding:5px 2px 0; gap:8px;"><div style="font-size:10px; opacity:.6; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(m.fileName||'Mídia')}</div>${dlBtn}${actions}</div>`;

  let qHtml = '';
  if(m.replyTo) {
    qHtml = `<div class="quote-box"><strong style="color:var(--accent2)">${esc(m.replyTo.nick)}</strong><br><span style="opacity:0.8">${esc(dec(m.replyTo.text)).substring(0,60)}...</span></div>`;
  }

  if(m.type==='image'){ h+=`<div class="bubble" style="padding:5px">${qHtml}<img class="msg-img" src="${esc(m.dataUrl)}" onclick="openLb(this.src)" loading="lazy">${mediaFooter}</div>`; }
  else if(m.type==='video'){ h+=`<div class="bubble" style="padding:5px">${qHtml}<video class="msg-vid" controls preload="metadata" src="${esc(m.dataUrl)}"></video>${mediaFooter}</div>`; }
  else if(m.type==='audio'){ h+=`<div class="bubble" style="padding:5px">${qHtml}<div class="msg-aud"><audio controls src="${esc(m.dataUrl)}" style="width:100%; height:36px; outline:none;"></audio></div>${mediaFooter}</div>`; }
  else if(m.type==='file' || m.type==='raw'){ h+=`<div class="bubble">${qHtml}<div class="msg-file"><span class="file-ico">${fileIcon(m.fileName)}</span><div class="file-info"><div class="file-nm">${esc(m.fileName)}</div><div class="file-sz">${fmtSize(m.fileSize)}</div></div><a class="dl-btn" href="${esc(m.dataUrl).replace('/upload/', '/upload/fl_attachment/')}" target="_blank">⬇️</a>${actions}</div></div>`; }
  else {
    let t = esc(dec(m.text||''));
    if(sv) t=t.replace(new RegExp(sv.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), x=>`<span class="highlight">${x}</span>`);
    t=t.replace(/(https?:\/\/[^\s<]+)/g, u=>`<a href="${u}" target="_blank">${u}</a>`).replace(/@(\w+)/g,'<span class="mention">@$1</span>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,`<code style="font-family:var(--mono);font-size:11px;background:rgba(0,0,0,.3);padding:1px 4px;border-radius:3px">$1</code>`);
    h+=`<div class="bubble">${qHtml}${t}<div style="display:flex; justify-content:flex-end; margin-top:2px;">${actions}</div>`;
    const um = (m.text||'').match(/(https?:\/\/[^\s]+)/);
    if(um) h+=`<div class="link-prev"><div style="font-weight:500;margin-bottom:2px">🔗 Link</div><div class="link-url">${esc(um[0].slice(0,60))}${um[0].length>60?'…':''}</div></div>`;
    h+=`</div>`;
  }
  return h + `</div>`;
}

function renderFullDOM(msgs) {
  const c = $('msgs');
  const sv = ($('search-input').value||'').toLowerCase();
  const list = sv ? msgs.filter(m=>((m.text||'')+(m.fileName||'')).toLowerCase().includes(sv)) : msgs;
  if(!list.length) { c.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text3)"><div style="font-size:42px;margin-bottom:10px">💬</div>Nenhuma mensagem.</div>'; return; }
  lastRenderedDate = ''; lastRenderedSender = '';
  c.innerHTML = list.map(m => buildMsgHTML(m, sv)).join('');
  updateTicks();
}

function renderDeltaDOM(msgs) {
  const c = $('msgs');
  if(c.innerHTML.includes('Nenhuma mensagem')) c.innerHTML = '';
  const sv = ($('search-input').value||'').toLowerCase();
  let h = '';
  msgs.forEach(m => {
    if(sv && !((m.text||'')+(m.fileName||'')).toLowerCase().includes(sv)) return;
    h += buildMsgHTML(m, sv);
  });
  if(h) {
    c.insertAdjacentHTML('beforeend', h);
    updateTicks();
  }
}

function scrollBot(force=false){ const c=$('msgs'); if(force||c.scrollHeight-c.scrollTop-c.clientHeight<240) c.scrollTop=c.scrollHeight; }

// ═══════════════════════════════════════════════
// CLOUDINARY UPLOAD E ENVIO OTIMISTA COM STATUS
// ═══════════════════════════════════════════════
async function compressImageToBlob(file) {
  return new Promise((resolve) => {
    const img = new Image(); const reader = new FileReader();
    reader.onload = (e) => {
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height, max = 1280; 
        if(w > max || h > max) { if(w > h) { h = Math.round((h *= max / w)); w = max; } else { w = Math.round((w *= max / h)); h = max; } }
        canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => { resolve({ blob: blob, name: file.name.replace(/\.[^/.]+$/, "") + ".jpg" }); }, 'image/jpeg', 0.7);
      }
    };
    reader.readAsDataURL(file);
  });
}

async function doSend() {
  const i=$('msg-input'), t=i.value.trim();
  if(!pending.length&&!t) return;
  $('send-btn').disabled=true;
  
  try {
    for(const f of pending) await sendFile(f);
    pending=[]; updateAttPreview();
    
    if(t) {
      const payloadText = enc(t); 
      // Adiciona o status interno 'sending'
      const msg = { nick, t:Date.now(), type:'text', text: payloadText, replyTo: replyData, status: 'sending' };
      
      lastSyncTime = Math.max(lastSyncTime, msg.t);
      currentMsgs.push(msg); saveCache();
      renderDeltaDOM([msg]);
      scrollBot(true);
      
      try {
        await fetch(SCRIPT_URL, { method: "POST", mode: 'no-cors', headers: { "Content-Type": "text/plain" }, body: JSON.stringify(msg) });
        msg.status = 'sent'; // Sucesso no fetch
      } catch(err) {
        msg.status = 'error'; // Falha de rede (Offline)
      }
      updateTicks();
    }
    cancelReply(); i.value=''; autoResize(i);
  } catch(e){ showToast('❌ Erro no envio!'); }
  $('send-btn').disabled=false;
}

async function sendFile(f) {
  $('upload-prog').style.display='block'; $('up-lbl').textContent=`Preparando ${f.name}…`; $('up-bar').style.width='0%';
  
  let typeCat = f.type.split('/')[0];
  let fileToUpload = f; let finalName = f.name;
  
  if (typeCat === 'image' && f.type !== 'image/gif') {
    $('up-lbl').textContent=`Comprimindo...`; $('up-bar').style.width='10%';
    const comp = await compressImageToBlob(f);
    fileToUpload = comp.blob; finalName = comp.name;
  } else if(!['image','video','audio'].includes(typeCat)) { typeCat = 'raw'; }

  $('up-lbl').textContent=`Enviando para nuvem...`;
  const formData = new FormData();
  formData.append('file', fileToUpload); formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  
  try {
    const dUrl = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, true);
      xhr.upload.onprogress = e => { if(e.lengthComputable) $('up-bar').style.width = (10 + (e.loaded/e.total*90)) + '%'; };
      xhr.onload = () => { if (xhr.status === 200) resolve(JSON.parse(xhr.responseText).secure_url); else reject(xhr.responseText); };
      xhr.onerror = () => reject('Erro de rede'); xhr.send(formData);
    });

    $('upload-prog').style.display='none';
    let finalTypeCat = typeCat === 'raw' ? 'file' : typeCat;
    const msg = {nick, t:Date.now(), type:finalTypeCat, dataUrl:dUrl, mimeType:fileToUpload.type, fileName:finalName, fileSize:fileToUpload.size, replyTo: replyData, status: 'sending'};
    
    lastSyncTime = Math.max(lastSyncTime, msg.t);
    currentMsgs.push(msg); saveCache();
    renderDeltaDOM([msg]); scrollBot(true);
    
    try {
      await fetch(SCRIPT_URL, { method: "POST", mode: 'no-cors', headers: { "Content-Type": "text/plain" }, body: JSON.stringify(msg) });
      msg.status = 'sent';
    } catch(err) { msg.status = 'error'; }
    updateTicks();
    cancelReply();
    
  } catch(err) { $('upload-prog').style.display='none'; showToast('❌ Falha ao enviar mídia.'); }
}

$('send-btn').addEventListener('click', doSend);
$('msg-input').addEventListener('keydown', e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
$('msg-input').addEventListener('input', function(){ autoResize(this); const n=this.value.length; $('char-ct').style.display=n>100?'inline':'none'; $('char-ct').textContent=n; });
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

function handleFiles(fs){ for(const f of fs) pending.push(f); updateAttPreview(); }
function updateAttPreview(){
  const p=$('att-preview'); if(!pending.length) { p.style.display='none'; return; }
  p.style.display='flex'; p.innerHTML=pending.map((f,i)=>`<div class="att-chip">${fileIcon(f.name)}<span>${esc(f.name)}</span><span class="att-rm" onclick="rmFile(${i})">×</span></div>`).join('');
}
function rmFile(i){ pending.splice(i,1); updateAttPreview(); }

// ═══════════════════════════════════════════════
// ÁUDIO E UTILITÁRIOS
// ═══════════════════════════════════════════════
$('rec-btn').addEventListener('click', async()=>{
  if(!recording){
    try {
      mediaRec = new MediaRecorder(await navigator.mediaDevices.getUserMedia({audio:true})); audioChunks=[];
      mediaRec.ondataavailable=e=>audioChunks.push(e.data);
      mediaRec.onstop=async()=>{ await sendFile(new File([new Blob(audioChunks)],`audio_${Date.now()}.webm`,{type:'audio/webm'})); mediaRec.stream.getTracks().forEach(t=>t.stop()); showToast('🎙️ Enviado!'); };
      mediaRec.start(); recording=true; $('rec-btn').style.color='var(--red)'; $('rec-btn').textContent='⏹️'; showToast('🔴 Gravando...');
    } catch(e){ showToast('Sem microfone'); }
  } else { mediaRec.stop(); recording=false; $('rec-btn').style.color=''; $('rec-btn').textContent='🎙️'; }
});

$('search-btn').addEventListener('click', ()=>{ const b=$('search-bar'); b.style.display=b.style.display==='none'?'block':'none'; b.style.display==='block'?$('search-input').focus():($('search-input').value='',renderFullDOM(currentMsgs)); });
$('search-input').addEventListener('input', ()=>renderFullDOM(currentMsgs));

const EMOJIS=['😀','😂','😍','🥰','😎','🤔','😮','😢','😡','🥳','🎉','❤️','👍','👎','🙏','🔥','💯','✅','❌','🎵','🌟','💡','🚀','🍕','🎮','💻','📱','📷','🎸','🏆','⚡','🌈','🎨','📝','🔮','💎','🦄','🐱','🐶','🌺'];
$('emoji-btn').addEventListener('click', ()=>{ const p=$('emoji-panel'); p.style.display==='none'?(p.innerHTML='<div class="emoji-row">'+EMOJIS.map(e=>`<span class="emj" onclick="insEmoji('${e}')">${e}</span>`).join('')+'</div>',p.style.display='block'):p.style.display='none'; });
function insEmoji(e){ const i=$('msg-input'), p=i.selectionStart; i.value=i.value.slice(0,p)+e+i.value.slice(p); i.focus(); i.selectionStart=i.selectionEnd=p+e.length; }

$('gen-toggle').addEventListener('click', ()=>{ $('gen-panel').classList.toggle('open'); if($('gen-panel').classList.contains('open')) $('gen-input').focus(); });
$('gen-close').addEventListener('click', ()=>$('gen-panel').classList.remove('open'));
$('gen-run').addEventListener('click', async()=>{
  const p=$('gen-input').value.trim(); if(!p) return;
  $('gen-run').disabled=true; showToast('✨ Gerando IA...');
  const msg = {nick,t:Date.now(),type:'image',dataUrl:`https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=512&height=512&nologo=true`,fileName:`ia.jpg`,fileSize:0, status:'sending'};
  lastSyncTime = Math.max(lastSyncTime, msg.t); currentMsgs.push(msg); renderDeltaDOM([msg]); scrollBot(true);
  try { await fetch(SCRIPT_URL, { method: "POST", mode: 'no-cors', headers: { "Content-Type": "text/plain" }, body: JSON.stringify(msg) }); msg.status='sent'; } catch(e){ msg.status='error'; }
  updateTicks();
  $('gen-input').value=''; $('gen-panel').classList.remove('open'); showToast('🎨 Gerada!'); $('gen-run').disabled=false;
});
$('gen-input').addEventListener('keydown',e=>{if(e.key==='Enter') $('gen-run').click();});

function openApps(){ $('apps-panel').classList.add('open'); }
function closeApps(){ $('apps-panel').classList.remove('open'); }
function openApp(u){ window.open(u,'_blank'); closeApps(); }
$('apps-panel').addEventListener('click', e=>{ if(e.target===$('apps-panel')) closeApps(); });
$('theme-btn').addEventListener('click', ()=>{
  lightMode=!lightMode; const r=document.documentElement.style;
  if(lightMode){ r.setProperty('--bg','#f5f4f8');r.setProperty('--bg2','#eeedf3');r.setProperty('--bg3','#e4e3ea');r.setProperty('--bg4','#d8d7df');r.setProperty('--text','#1a1a2e');r.setProperty('--text2','#44435a');r.setProperty('--text3','#8888a0');$('theme-btn').textContent='☀️'; } 
  else { ['--bg','--bg2','--bg3','--bg4','--text','--text2','--text3'].forEach(p=>r.removeProperty(p));$('theme-btn').textContent='🌙'; }
});
$('hamburger').addEventListener('click',()=>{$('sidebar').classList.toggle('open'); $('overlay').classList.toggle('show');});
function closeSb(){ $('sidebar').classList.remove('open'); $('overlay').classList.remove('show'); }
function openLb(s){ $('lb-img').src=s; $('lb').classList.add('open'); }
function closeLb(){ $('lb').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeLb(); closeApps(); } });
$('copy-btn').addEventListener('click',()=>{ navigator.clipboard.writeText(location.href.split('?')[0]).then(()=>showToast('🔗 Copiado!')).catch(()=>{const e=document.createElement('textarea');e.value=location.href;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);showToast('🔗 Copiado!');}); });
document.addEventListener('paste',e=>{ if(nick) for(const i of (e.clipboardData?.items||[])) if(i.kind==='file'){ pending.push(i.getAsFile()); updateAttPreview(); showToast('📋 Colado!'); } });
$('main').addEventListener('dragover',e=>{ e.preventDefault(); $('input-wrap').style.borderColor='var(--accent)'; });
$('main').addEventListener('dragleave',()=>$('input-wrap').style.borderColor='');
$('main').addEventListener('drop',e=>{ e.preventDefault(); $('input-wrap').style.borderColor=''; if(nick&&e.dataTransfer?.files){ handleFiles(e.dataTransfer.files); showToast('📎 Adicionado'); } });

let toastTm; function showToast(m,d=2500){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTm); toastTm=setTimeout(()=>t.classList.remove('show'),d); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtSize(b){ return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'; }
function fileIcon(n){ const e=(n||'').split('.').pop().toLowerCase(), m={pdf:'📄',doc:'📝',xls:'📊',ppt:'📋',zip:'🗜️',rar:'🗜️',mp3:'🎵',mp4:'🎬',jpg:'🖼️',png:'🖼️'}; return m[e]||'📁'; }
</script>
